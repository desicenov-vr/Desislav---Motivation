<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Позитивни късметчета - Desislav Tsenov</title>
    <meta property="og:title" content="🔮 Crystal Oracle - Твоят Късмет">
    <meta property="og:description" content="Докосни сферата и си поеми дълбоко дъх... Виж какво съобщение те очаква!">
    <meta property="og:type" content="website">
    <style>
        :root { --primary: #7c3aed; --secondary: #db2777; }
        body { background: #020617; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { text-align: center; width: 85%; max-width: 500px; padding: 50px 30px; background: rgba(255, 255, 255, 0.03); border-radius: 50px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .btn { width: 260px; height: 260px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(124, 58, 237, 0.4); margin-bottom: 30px; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; user-select: none; padding: 25px; box-sizing: border-box; overflow: hidden; }
        .btn span { font-size: 50px; margin-bottom: 10px; display: block; }
        .btn-text { display: block; width: 100%; line-height: 1.2; word-wrap: break-word; white-space: normal; }
        .btn:active { transform: scale(0.95); }
        #display { margin-top: 20px; font-size: 24px; line-height: 1.5; min-height: 200px; color: #fff; font-weight: 300; font-style: italic; display: flex; align-items: center; justify-content: center; outline: none; }
        .share-btn { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 15px 30px; border-radius: 40px; cursor: pointer; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; display: none; width: 100%; max-width: 200px; margin-left: auto; margin-right: auto; font-weight: bold; }
        .shuffling { opacity: 0.5; filter: blur(3px); }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 14px; color: #94a3b8; letter-spacing: 3px; text-transform: uppercase; }
        .author { color: #fcd34d; font-weight: bold; display: block; margin-top: 8px; font-size: 18px; }
        @media (max-width: 480px) { .btn { width: 220px; height: 220px; font-size: 14px; padding: 20px; } .btn span { font-size: 40px; } }
    </style>
</head>
<body>
    <div class="card" role="main">
        <button id="mainBtn" class="btn" onclick="go()" aria-label="Разбъркай мисълта за теб">
            <span aria-hidden="true">🔮</span>
            <div class="btn-text">Разбъркай мисълта за теб</div>
        </button>
        <div id="display" role="status" aria-live="assertive" tabindex="-1">Докосни сферата и си поеми дълбоко дъх...</div>
        <button id="shareBtn" class="share-btn" onclick="shareResult()">📢 СПОДЕЛИ</button>
        <div class="footer">A special gift by <span class="author">Desislav Tsenov</span></div>
    </div>
    <script>
        const morningQuotes = [
            "Първо кафето, после плановете. Добро утро и успех!",
            "Уханието на кафе е обещание за свежи идеи. Енергичен старт на деня!",
            "Уханието на кафе е обещание за успешен старт. Желая ти страхотен ден!",
            "Въздухът сутрин е пълен с нови възможности. Нека денят ти бъде слънчев!",
            "Днес си магнит за чудеса... и добро кафе. Добро утро!",
            " Хубав ден!",
            "Сутринта е време за мечти и гореща напитка. Усмихни се на утрото!",
            "Нека първата глътка кафе ти донесе гениална идея. Успешен ден!",
            "Животът започва след първото кафе. Добро утро и прекрасен ден!"
        ];
        const lunchQuotes = [
            "Обядът не е само храна, а и време за рестарт. Наслади се на паузата!",
            "Време е за презареждане и още едно малко кафе. Вкусен и спокоен обяд!",
            "Половината ден мина – справи се страхотно! Да ти е сладко!",
            "Дай си 5 минути почивка. Заслужил си я! Презареди с добро настроение!",
            "Една вкусна пауза прави чудеса с настроението. Приятен обяд!"
        ];
        const afternoonQuotes = [
            "Следобедното кафе е малкият лукс, който заслужаваш. Свеж следобед!",
 "Задружна дружина, две каси с бира изпива.",
    "Който пие, пее. Който пее, зло не мисли. Който не мисли – му е екстра!",
    "Сметката в заведението и годините се броят само ако си нямаш друга работа.",
           "Малка разходка или чаша вода – буди тялото ти! Свеж следобед ти желая!",
            "Най-добрите идеи идват с второто кафе за деня.!",
            "Нека времето ти сега бъде леко и ползотворно. Наслади се на остатъка от деня!",
            "Още малко усилия и успехът ще е в ръцете ти. Успешно довършване на деня!"
        ];
        const eveningQuotes = [
            "Хубава и уютна вечер!",
            "Топла вечер, хубава музика и ти... перфектната комбинация. Наслади се!",
            "Време е да свалиш 'бронята' и просто да бъдеш себе си. Пълен релакс!",
            "Си пи си любимата напитка и се наслади на вечерта!",
            "Наслади се на спокойствието на залеза. Мирна и споделена вечер!"
        ];
        const nightQuotes = [
            "Мечтай смело, докато заспиваш – сънищата са план за бъдещето. Лека нощ!",
            "Остави мислите да отлетят. Нощта носи мъдрост в тишината. Спи спокойно!",
            "Всяка нощ е мост към едно по-добро 'утре'. Сладки сънища!",
            "Тишина, уют и покой. Подари си ги. спокойна нощ!"
        ];
        const wisdomQuotes = ["Заедно можем повече!", "Промени мислите си и ще промениш света си.", "Малки крачки всеки ден водят до големи промени.",
"Не се притеснявай за нищо. Всичко ще се подреди по най-добрия начин за теб.",
"Поел си в правилна посока, нещата ще се наредят по възможно най-добрия начин.",
"Не позволявай на временни проблеми да развалят дългосрочните ти планове.",
"Всяка твоя мисъл днес гради реалността ти утре. Мисли като победител!",
"Спри да мислиш за хиляди неща. Фокусирай се върху следващата правилна стъпка.",
"Всяка трудност е просто маска, зад която се крие нова възможност.",
"Гледай напред с надежда и назад с благодарност.",
"Не гледай колко е висок върхът, а просто продължавай да се катериш. Ще стигнеш!",
"Твоята интуиция знае пътя. Слушай сърцето си, то рядко греши.",
"Днешните усилия са утрешните победи. Не се отказвай точно сега!",
"Ти притежаваш всичко необходимо, за да се справиш с всяко предизвикателство.",
"Успехът не е късмет, а подготовка, срещнала възможност.",
"Бъди благодарен за това, което имаш, и ще получиш това, за което мечтаеш.",
"Довери се на процеса. Всичко се случва точно навреме, нито по-рано, нито по-късно.",
"Ти си по-силен, отколкото предполагаш, и по-подготвен, отколкото се чувстваш.",
"Остави напрежението настрана. Вселената вече подготвя следващата ти голяма победа.",
"Най-доброто тепърва предстои.",
"Твоето спокойствие е твоят най-голям коз. Запази го и всичко ще се нареди.",
"Не чакай идеалния момент. Вземи този момент и го направи идеален.",
"Ти си на точното място, в точното време. Всичко останало е просто въпрос на търпение.", "Вярвай в себе си – това е ключът към всичко.", "Твоята енергия е твоята безценна валута. Харчи я разумно!"];
        const challenges = ["ПРЕДИЗВИКАТЕЛСТВО: Целуни човека до теб!", "ПРЕДИЗВИКАТЕЛСТВО: Направи 10 лицеви опори!", "Предизвикателство: Обади се на стар приятел, с когото не си говорил от месеци. Само да го чуеш как е.",
"Предизвикателство: Днес не се оплаквай от нищо – нито от времето, нито от трафика, нито от работата. Виж как ще се почувстваш.",
"Предизвикателство: Днес опитай нещо ново – нова храна, нов път до работа или нова музика. Излез от коловоза!",
"Предизвикателство: Напиши на лист една цел, която те плаши, и направи първата малка крачка към нея.",
"ПРЕДИЗВИКАТЕЛСТВО: Кажи нещо мило на някого.", "ПРЕДИЗВИКАТЕЛСТВО: Изпий една чаша вода на екс!"];

        let history = [];
        let audioCtx;
        let lastResult = "";

        function playSound(freq, time, vol, type = 'sine', decay = 0.8) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + time);
                g.gain.setValueAtTime(0, audioCtx.currentTime + time);
                g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + time + 0.01);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + time + decay);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + time);
                osc.stop(audioCtx.currentTime + time + decay);
            } catch(e) {}
        }

        function go() {
            const btn = document.getElementById('mainBtn');
            const d = document.getElementById('display');
            const sBtn = document.getElementById('shareBtn');
            btn.style.pointerEvents = 'none';
            sBtn.style.display = 'none';
            d.innerText = "";
            d.classList.add('shuffling');
            d.setAttribute('aria-hidden', 'true');
            
            [1046, 1318, 1568, 2093].forEach((f, i) => playSound(f, i * 0.08, 0.1));
            
            const hour = new Date().getHours();
            let timePool = [];
            if (hour >= 5 && hour < 12) timePool = morningQuotes;
            else if (hour >= 12 && hour < 14) timePool = lunchQuotes;
            else if (hour >= 14 && hour < 18) timePool = afternoonQuotes;
            else if (hour >= 18 && hour < 22) timePool = eveningQuotes;
            else timePool = nightQuotes;

            let pool = [...wisdomQuotes, ...timePool, ...timePool, ...timePool]; 
            
            let count = 0;
            const s = setInterval(() => {
                d.innerText = pool[Math.floor(Math.random() * pool.length)];
                count++;
                if (count > 20) {
                    clearInterval(s);
                    d.innerText = "";
                    setTimeout(() => {
                        d.classList.remove('shuffling');
                        d.removeAttribute('aria-hidden');
                        let choice;
                        if (Math.random() < 0.12) {
                            choice = challenges[Math.floor(Math.random() * challenges.length)];
                        } else {
                            let available = pool.filter(q => !history.includes(q));
                            if (available.length === 0) { history = []; available = pool; }
                            choice = available[Math.floor(Math.random() * available.length)];
                        }
                        history.push(choice);
                        lastResult = choice;
                        d.innerText = choice;
                        d.focus();
                        
                        if (choice.includes("ПРЕДИЗВИКАТЕЛСТВО")) {
                            playSound(150, 0, 0.4, 'square', 0.1); 
                        } else {
                            [1318, 1568, 2093, 2637].forEach((f, i) => playSound(f, i * 0.1, 0.1));
                        }
                        
                        sBtn.style.display = 'block';
                        btn.style.pointerEvents = 'auto';
                    }, 50);
                }
            }, 60);
        }

        function shareResult() {
            const link = window.location.origin + window.location.pathname;
            const textToShare = "🔮 Късметчето ми за днес: " + lastResult + "\n\n👉 Виж своя тук:\nCrystal Oracle - Твоят Късмет\n" + link;
            const el = document.createElement('textarea');
            el.value = textToShare;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const d = document.getElementById('display');
            const oldText = d.innerText;
            d.innerText = "✅ Копирано! Отварям Facebook...";
            setTimeout(() => {
                if(d.innerText.includes("Копирано")) d.innerText = oldText;
                window.open("https://www.facebook.com/", "_blank");
            }, 1200);
        }
    </script>
</body>
</html>
