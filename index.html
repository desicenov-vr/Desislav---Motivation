<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Oracle</title>
    <style>
        :root { --primary: #7c3aed; --secondary: #db2777; }
        html, body { height: 100%; margin: 0; padding: 0; background: #020617; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        body { color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { text-align: center; width: 90%; max-width: 500px; padding: 40px 20px; background: rgba(255, 255, 255, 0.03); border-radius: 50px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .btn { width: 220px; height: 220px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px rgba(124, 58, 237, 0.4); margin-bottom: 20px; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; text-transform: uppercase; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn span { font-size: 50px; margin-bottom: 10px; display: block; }
        #display { margin-top: 20px; font-size: 24px; line-height: 1.5; min-height: 160px; color: #fff; font-weight: 300; font-style: italic; display: flex; align-items: center; justify-content: center; outline: none; }
        .share-btn { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 15px 30px; border-radius: 40px; cursor: pointer; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; display: none; width: 100%; max-width: 200px; margin-left: auto; margin-right: auto; font-weight: bold; }
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
        .author { color: #fcd34d; font-weight: bold; display: block; margin-top: 5px; font-size: 16px; }
        .shuffling { opacity: 0.5; filter: blur(3px); }
    </style>
</head>
<body>
    <div class="card">
        <button id="mainBtn" class="btn" onclick="go()" aria-label="Разбъркай мисълта за теб">
            <span aria-hidden="true">🔮</span>
            <div id="btnText" style="font-weight: bold;">РАЗБЪРКАЙ</div>
        </button>
        <div id="display" role="status" aria-live="polite" tabindex="-1">Докосни сферата и си поеми дълбоко дъх...</div>
        <button id="shareBtn" class="share-btn" onclick="shareResult()">📢 СПОДЕЛИ</button>
        <div class="footer">A special gift by <span class="author">Desislav Tsenov</span></div>
    </div>
    <script>
        const pool = [
            "Усмивката ти днес ще отвори врати, които вчера са били затворени.",
            "Очаква те приятна изненада от човек, за когото не мислиш често.",
            "Малка стъпка днес ще доведе до голям успех утре.",
            "Днес е идеалният ден да започнеш нещо ново.",
            "Късметът е на твоя страна — възползвай се!",
            "Скоро ще чуеш новина, която ще те зарадва.",
            "Смелостта ти ще бъде възнаградена.",
            "Нещо, което търсиш, вече е по-близо, отколкото мислиш.",
            "Вярвай в себе си — това е ключът към успеха ти.",
            "Днес е ден за сбъдване на малки мечти.",
            "Любовта идва, когато най-малко я очакваш.",
            "Очаква те среща, която ще промени всичко.",
            "Днес усилията ти ще бъдат забелязани и оценени.",
            "Очаква те нова възможност, която ще промени посоката ти към по-добро.",
            "Работата ти ще донесе не само успех, но и удовлетворение.",
            "Упоритостта ти ще се отплати по неочакван начин.",
            "Днес ще получиш признание, което заслужаваш.",
            "Креативността ти ще отвори нови врати.",
            "Предстои ти среща с човек, който ще помогне за развитието ти.",
            "Вярвай в себе си — правилният път вече е пред теб.",
            "Финансов успех се задава на хоризонта.",
            "Трудът ти ще бъде възнаграден с нещо повече от очакваното.",
            "Днес е ден за смели решения — успехът е с теб.",
            "Нов проект ще ти донесе вдъхновение и растеж.",
            "Балансът между усилие и почивка ще ти донесе най-добри резултати.",
            "Очаква те добър шанс — не се колебай да го грабнеш."
        ];
        const challenges = [
            "ПРЕДИЗВИКАТЕЛСТВО: Прочети 3 книги за 14 дни.",
            "ПРЕДИЗВИКАТЕЛСТВО: Тренирай всеки ден по минимум 20 минути.",
            "ПРЕДИЗВИКАТЕЛСТВО: Спести определена сума пари за 30 дни.",
            "ПРЕДИЗВИКАТЕЛСТВО: Научи 50 нови думи на чужд език за седмица.",
            "ПРЕДИЗВИКАТЕЛСТВО: Пиши по една страница дневно.",
            "ПРЕДИЗВИКАТЕЛСТВО: Направи 100 лицеви опори днес.",
            "ПРЕДИЗВИКАТЕЛСТВО: Яж само домашна храна за 2 седмици.",
            "ПРЕДИЗВИКАТЕЛСТВО: Направи добро дело днес.",
            "ПРЕДИЗВИКАТЕЛСТВО: Не се оплаквай за 5 дни.",
            "ПРЕДИЗВИКАТЕЛСТВО: Говори цял ден като герой от филм.",
            "ПРЕДИЗВИКАТЕЛСТВО: Казвай „да“ на всичко днес.",
            "ПРЕДИЗВИКАТЕЛСТВО: Направи си странна прическа.",
            "ПРЕДИЗВИКАТЕЛСТВО: Измисли нова дума и я използвай.",
            "ПРЕДИЗВИКАТЕЛСТВО: Пиши на приятели само с въпроси.",
            "ПРЕДИЗВИКАТЕЛСТВО: Гледай филм без звук и си измисляй диалог.",
            "ПРЕДИЗВИКАТЕЛСТВО: Не се засмивай днес.",
            "ПРЕДИЗВИКАТЕЛСТВО: Направи 10 откачени селфита.",
            "ПРЕДИЗВИКАТЕЛСТВО: Убеди приятел в нещо лудо.",
            "ПРЕДИЗВИКАТЕЛСТВО: Направи най-смешната реклама.",
            "ПРЕДИЗВИКАТЕЛСТВО: Говори 30 минути с чужд акцент.",
            "ПРЕДИЗВИКАТЕЛСТВО: Смени си дрехите с приятел."
        ];
        let currentChoice = "";
        let audioCtx;
        function playSound(f, t, v, type = 'sine', d = 0.8) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = type;
                o.frequency.setValueAtTime(f, audioCtx.currentTime + t);
                g.gain.setValueAtTime(0, audioCtx.currentTime + t);
                g.gain.linearRampToValueAtTime(v, audioCtx.currentTime + t + 0.01);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + t + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(audioCtx.currentTime + t);
                o.stop(audioCtx.currentTime + t + d);
            } catch(e) {}
        }
        function go() {
            const btn = document.getElementById('mainBtn');
            const d = document.getElementById('display');
            const sBtn = document.getElementById('shareBtn');
            const bT = document.getElementById('btnText');
            btn.style.pointerEvents = 'none';
            sBtn.style.display = 'none';
            d.setAttribute('aria-hidden', 'true');
            d.classList.add('shuffling');
            [1046, 1318, 1568, 2093].forEach((f, i) => playSound(f, i * 0.08, 0.1));
            let count = 0;
            const s = setInterval(() => {
                d.innerText = pool[Math.floor(Math.random() * pool.length)];
                if (++count > 20) {
                    clearInterval(s);
                    d.classList.remove('shuffling');
                    d.removeAttribute('aria-hidden');
                    currentChoice = Math.random() < 0.2 ? challenges[Math.floor(Math.random() * challenges.length)] : pool[Math.floor(Math.random() * pool.length)];
                    d.innerText = currentChoice;
                    d.focus();
                    sBtn.style.display = 'block';
                    if (currentChoice.includes("ПРЕДИЗВИКАТЕЛСТВО")) playSound(150, 0, 0.4, 'square', 0.1);
                    else playSound(2637, 0, 0.15);
                    btn.style.pointerEvents = 'auto';
                    bT.innerText = "ОЩЕ ВЕДНЪЖ";
                }
            }, 60);
        }
        function shareResult() {
            const link = window.location.origin + window.location.pathname;
            if (navigator.share) {
                navigator.share({ 
                    title: 'Crystal Oracle', 
                    text: 'Изтегли своя късмет тук:', 
                    url: link 
                }).catch(() => {});
            }
        }
    </script>
</body>
</html>
