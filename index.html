<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queens Luck - Desislav Tsenov</title>
    <meta property="og:title" content="🥤 Queens Luck - Твоят Късмет">
    <meta property="og:description" content="Отвори своята капачка и виж какво те очаква!">
    <meta property="og:image" content="https://img.icons8.com/emoji/256/bottle-cap.png">
    <style>
        :root { --q-red: #e11d48; --q-dark: #be123c; }
        body { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { text-align: center; width: 85%; max-width: 500px; padding: 40px 20px; background: rgba(255, 255, 255, 0.02); border-radius: 50px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 100px rgba(0,0,0,0.9); }
        .btn { width: 230px; height: 230px; border-radius: 50%; border: 8px solid #fff; background: linear-gradient(145deg, var(--q-red), var(--q-dark)); color: white; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 30px; display: inline-flex; align-items: center; justify-content: center; text-transform: uppercase; transition: all 0.1s; -webkit-tap-highlight-color: transparent; padding: 30px; text-align: center; line-height: 1.2; }
        .btn:active { transform: scale(0.95); }
        .open-anim { animation: pop 0.5s ease; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-25px); } 100% { transform: scale(1); } }
        #display { margin-top: 20px; font-size: 24px; line-height: 1.4; min-height: 160px; color: #fff; font-weight: 300; font-style: italic; display: flex; align-items: center; justify-content: center; outline: none; padding: 0 10px; }
        .share-btn { background: #fff; border: none; color: #000; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-size: 14px; text-transform: uppercase; margin-top: 20px; display: none; font-weight: 900; transition: all 0.2s; margin-bottom: 20px; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; color: #94a3b8; line-height: 1.8; }
        .author { color: #fcd34d; font-weight: bold; display: block; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <button id="mainBtn" class="btn" onclick="go()">Твоята капачка за днес</button>
        <div id="display" role="status" aria-live="assertive" tabindex="-1">Кликни за късмет...</div>
        <button id="shareBtn" class="share-btn" onclick="share()">📢 СПОДЕЛИ КЪСМЕТА</button>
        <div class="footer">
            A special gift by
            <span class="author">Desislav Tsenov</span>
        </div>
    </div>
    <script>
        const morning = ["Първо кафето, после плановете. Добро утро!", "Уханието на кафе е обещание за свежи идеи.", "Днес си магнит за чудеса... и добро кафе!", "Усмихни се на късмета си – днес той е изцяло на твоя страна.", "Днес е твоят ден да бъдеш център на вниманието – възползвай се!", "Кафето ти днес е със специална добавка: 100% успех!", "Добро утро! Днес усмивката ти ще отваря повече врати от всеки ключ.", "Събуди се с мисълта, че нещо голямо предстои. И кафето помага!", "Днес си в режим 'всичко ми се получава'. Пий едно кафе и започвай!"];
        const lunch = ["Време е за презареждане и още едно кафе. Да ти е сладко!", "Половината ден мина – справи се страхотно!", "Днес е денят да довършиш онова, което отлагаш от седмици. Ще ти олекне!", "Днес бизнесът и парите са на твоя страна. Действай решително!", "Обядът е важен, но твоят успех е по-важен. Нахрани се и ги смачкай!", "След добрия обяд идват най-добрите бизнес идеи.", "Пауза за обяд и малко хумор – днес ще си най-бързият в офиса."];
        const afternoon = ["Следобедното кафе е луксът, който заслужаваш.", "Трудът ти най-после ще бъде оценен подобаващо – очаквай бонус или похвала!", "Помниш ли как събирахме капачките на queens в голямото междучасие? Днес ти предстоят хубави неща!", "Нов проект или нова идея ще се превърнат в твоя златен шанс съвсем скоро.", "Следобедът носи новини, които ще те накарат да се усмихнеш широко.", "Енергията ти следобед е заразна. Предай я на колегите!", "Късметът ти за днес: телефонът ще звънне с предложение, на което не се отказва."];
        const evening = ["Очаквай успех в преговорите – днес гласът ти тежи повече от всякога.", "Днес колегите ти ще видят в теб истински лидер. Поведи ги!", "Професионалният ти път придобива нова, по-ясна посока. Гледай само напред!", "„Започни да правиш необходимото, после възможното и изведнъж ще откриеш, че постигаш невъзможното.“", "Вечерта ти носи заслужено признание и спокойна гордост от свършеното.", "Днес си направил малка стъпка, която скоро ще стане голям скок."];
        const night = ["Мечтай смело, докато заспиваш. Лека нощ!", "Остави мислите да отлетят. Спи спокойно!", "Всяка нощ е мост към едно по-добро 'утре'.", "„Не чакай. Времето за действие никога няма да изглежда подходящо.“", "Тишина, спокойствие и един голям късмет под възглавницата."];
        const base = [
            "Някому се падна люлката, ала таз година твоя ще е булката.",
            "Късмет изтегли, всичко е решено- парички ти се падат във зелено!",
            "Заедно можем повече!",
            "Някои неща не се забравят, точно като безгрижието от детството. Очаквай хубава новина!",
            "Ще получиш признание за нещо, което си мислел, че никой не е забелязал.",
            "Отвори сетивата си за хубавите моменти!",
            "Малка стъпка днес ще доведе до голям успех съвсем скоро.",
            "Днес ще ти пишат за нещо готино в месинджър.",
            "Усмивката ти е заразна. Предай я нататък!",
            "Някой те споменава с добро в момента. Усмихни се!",
            "ПРЕДИЗВИКАТЕЛСТВО: Напиши на стар приятел: 'Брат, помниш ли как събирахме капачки от Queens?'",
            "ПРЕДИЗВИКАТЕЛСТВО: Обади се на човек, с когото сте правили бели като малки.",
            "ПРЕДИЗВИКАТЕЛСТВО: Намери снимка от ученическите години и я прати в общия чат.",
            "Предизвикателство: ако харесваш някого и се чудиш дали да му признаеш, действай сега!",
            "Предизвикателство: обади се на приятел и си промени гласа.",
            "Предизвикателство: Спукай балон!",
            "Днес си като капачка на Queens – всеки иска да види какви мисли има в главата ти!",
            "Късметът ти е 'чук' – всички врати се отварят, само влез!",
            "Днес си 10 от 10. Гледай си кефа!"
        ];

        let history = [];
        let audioCtx;

        function play(f, d, v, t='sine') {
            try {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        function go() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const btn = document.getElementById('mainBtn');
            const d = document.getElementById('display');
            const sBtn = document.getElementById('shareBtn');
            
            btn.style.pointerEvents = 'none';
            sBtn.style.display = 'none';
            btn.classList.add('open-anim');
            play(150, 0.1, 0.4, 'square');

            const hour = new Date().getHours();
            let pool = [];
            if (hour >= 5 && hour < 12) pool = morning;
            else if (hour >= 12 && hour < 14) pool = lunch;
            else if (hour >= 14 && hour < 18) pool = afternoon;
            else if (hour >= 18 && hour < 22) pool = evening;
            else pool = night;
            
            let combinedPool = [...pool, ...base];
            let count = 0;
            const spin = setInterval(() => {
                d.innerText = combinedPool[Math.floor(Math.random() * combinedPool.length)];
                play(800 + Math.random()*500, 0.05, 0.05);
                count++;
                if (count > 25) {
                    clearInterval(spin);
                    btn.classList.remove('open-anim');
                    let filtered = combinedPool.filter(x => !history.includes(x));
                    if (filtered.length === 0) { history = []; filtered = combinedPool; }
                    const res = filtered[Math.floor(Math.random() * filtered.length)];
                    history.push(res);
                    d.innerText = res;
                    d.focus();
                    play(1200, 0.3, 0.1);
                    btn.style.pointerEvents = 'auto';
                    sBtn.style.display = 'inline-block';
                }
            }, 80);
        }

        function share() {
            const sBtn = document.getElementById('shareBtn');
            const originalText = sBtn.innerText;
            const txt = "🥤 Късметът ми от Queens: " + document.getElementById('display').innerText + "\n\n👉 Пробвай тук: " + window.location.href;
            const el = document.createElement('textarea');
            el.value = txt; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            sBtn.innerText = "✅ КОПИРАНО!";
            setTimeout(() => {
                sBtn.innerText = originalText;
                window.open("https://www.facebook.com/", "_blank");
            }, 800);
        }
    </script>
</body>
</html>
